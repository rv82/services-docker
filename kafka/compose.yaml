networks:
  kafka:
    external: false

volumes:
  kafka-data:
    external: false

services:
  kafka:
    image: 'docker.io/bitnami/kafka:latest'
    ports:
      - 9092:9092
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092,INTERNAL://kafka:9094
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@localhost:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_KRAFT_CLUSTER_ID=kafka-kraft-compose-0
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - kafka
    restart: unless-stopped

  redpanda:
    image: docker.redpanda.com/redpandadata/console:latest
    ports:
      - 8050:8080
    environment:
      - KAFKA_BROKERS=kafka:9094
    networks:
      - kafka
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui
    # container_name: kafka-ui
    ports:
      - 8080:8080
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9094
      - DYNAMIC_CONFIG_ENABLED=true
    networks:
      - kafka
    restart: unless-stopped
