volumes:
  portainer_data:
    external: false

services:
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:lts
    ports:
      - 8000:8000
      - 9443:9443
    volumes:
      - portainer_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped